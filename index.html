<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Feliz Aniversário ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rosa-primary: #d4516f;
            --rosa-light: #ff9bb4;
            --rosa-lighter: #ffe4ec;
            --gold-accent: #d4af37;
            --dark: #2a1420;
            --creme: #faf8f6;
            --shadow-soft: 0 8px 32px rgba(212, 81, 111, 0.12);
            --shadow-medium: 0 12px 48px rgba(212, 81, 111, 0.18);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--creme) 0%, #f5f0ee 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════════════════════════ */
        /* TELA INICIAL                                               */
        /* ══════════════════════════════════════════════════════════ */
        #tela-inicio {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--rosa-primary) 0%, var(--rosa-light) 50%, #ff7fa8 100%);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            text-align: center;
            padding: 24px;
        }

        #tela-inicio.oculta {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ── Corações decorativos na tela inicial ── */
        .inicio-coracao {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            margin-bottom: 8px;
            animation: pulsarCoracao 2s ease-in-out infinite;
            display: block;
        }

        @keyframes pulsarCoracao {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .titulo-inicio {
            font-family: 'Cormorant Garamond', serif;
            /* ✅ FIX: clamp menor para não estourar no mobile */
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 300;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.04em;
            line-height: 1.15;
            text-align: center;
            padding: 0 12px;
            margin-bottom: 10px;
            /* ✅ FIX: garante que não quebra mal */
            word-break: break-word;
            hyphens: auto;
        }

        .subtitulo-inicio {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-style: italic;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 0.08em;
            margin-bottom: 48px;
            padding: 0 12px;
        }

        .data-inicio {
            font-size: clamp(0.75rem, 2.2vw, 0.95rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .btn-iniciar {
            background: #ffffff;
            color: var(--rosa-primary);
            border: none;
            border-radius: 50px;
            /* ✅ FIX: padding responsivo para mobile */
            padding: clamp(14px, 3vw, 18px) clamp(28px, 8vw, 52px);
            font-family: 'Lato', sans-serif;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            /* ✅ FIX: texto do botão quebra em mobile pequeno */
            white-space: nowrap;
            max-width: 90vw;
        }

        .btn-iniciar:hover { transform: translateY(-4px); box-shadow: 0 16px 50px rgba(0,0,0,0.25); }
        .btn-iniciar:active { transform: translateY(-2px); }

        /* ══════════════════════════════════════════════════════════ */
        /* APP PRINCIPAL                                              */
        /* ══════════════════════════════════════════════════════════ */
        #app {
            min-height: 100vh;
            /* ✅ FIX: padding-bottom grande para personagens fixos não cobrirem conteúdo */
            padding: 50px 20px 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            /* ✅ FIX: tamanho menor em mobile para não descentralizar */
            font-size: clamp(1.6rem, 6vw, 3.2rem);
            font-weight: 300;
            background: linear-gradient(135deg, var(--rosa-primary) 0%, var(--rosa-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: 0.02em;
            /* ✅ FIX: texto centralizado sem quebra estranha */
            text-align: center;
            white-space: nowrap;
        }

        /* ✅ FIX: em telas muito pequenas, permite quebra elegante */
        @media (max-width: 380px) {
            .header h1 { white-space: normal; word-break: break-word; }
        }

        .header .data-tag {
            display: inline-block;
            background: linear-gradient(135deg, var(--rosa-lighter) 0%, #ffcce5 100%);
            color: var(--rosa-primary);
            font-size: clamp(0.65rem, 2vw, 0.75rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 7px 16px;
            border-radius: 30px;
            margin-bottom: 6px;
            font-weight: 600;
            box-shadow: var(--shadow-soft);
        }

        .header .contador-wrapper {
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            color: var(--rosa-primary);
            margin-top: 14px;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        /* ══════════════════════════════════════════════════════════ */
        /* CARD FRASES                                                */
        /* ══════════════════════════════════════════════════════════ */
        .card-frases {
            background: #ffffff;
            border-radius: 28px;
            padding: 48px 40px;
            max-width: 560px;
            width: 100%;
            box-shadow: var(--shadow-medium);
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 32px;
            border: 1px solid rgba(212, 81, 111, 0.08);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #texto {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 4.5vw, 1.8rem);
            font-style: italic;
            font-weight: 300;
            color: var(--dark);
            line-height: 1.8;
            text-align: center;
            min-height: 80px;
            letter-spacing: 0.01em;
        }

        #cursor {
            display: inline-block;
            width: 2.5px;
            height: 1.3em;
            background: var(--rosa-primary);
            margin-left: 3px;
            vertical-align: middle;
            animation: piscar 0.7s step-end infinite;
            border-radius: 1px;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        #progresso { display: none; }

        .btn-proximo {
            background: linear-gradient(135deg, var(--rosa-primary), var(--rosa-light));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 48px;
            font-family: 'Lato', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 81, 111, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .btn-proximo:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(212,81,111,0.4); }
        .btn-proximo:active:not(:disabled) { transform: translateY(-2px); }
        .btn-proximo:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ══════════════════════════════════════════════════════════ */
        /* CARD SURPRESA                                              */
        /* ══════════════════════════════════════════════════════════ */
        #surpresa {
            display: none;
            flex-direction: column;
            align-items: center;
            max-width: 560px;
            width: 100%;
            animation: fadeIn 0.8s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        #surpresa h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 300;
            background: linear-gradient(135deg, var(--rosa-primary) 0%, var(--rosa-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        #surpresa img {
            width: 85%;
            max-width: 300px;
            border-radius: 24px;
            box-shadow: var(--shadow-medium);
            margin-bottom: 32px;
            border: 2px solid rgba(212, 81, 111, 0.1);
            transition: transform 0.3s ease;
        }

        #surpresa img:hover { transform: scale(1.02); }

        /* ══════════════════════════════════════════════════════════ */
        /* TEXTO MÚSICA 2                                             */
        /* ══════════════════════════════════════════════════════════ */
        #textoMusica2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.2rem, 4.5vw, 1.7rem);
            font-style: italic;
            font-weight: 300;
            color: var(--dark);
            line-height: 1.9;
            text-align: center;
            min-height: 80px;
            max-width: 480px;
            width: 100%;
            padding: 0 20px;
            letter-spacing: 0.01em;
        }

        #cursor2 {
            display: inline-block;
            width: 2.5px;
            height: 1.3em;
            background: var(--rosa-primary);
            margin-left: 3px;
            vertical-align: middle;
            animation: piscar 0.7s step-end infinite;
            border-radius: 1px;
        }

        /* ══════════════════════════════════════════════════════════ */
        /* CORAÇÕES FLUTUANTES                                        */
        /* ══════════════════════════════════════════════════════════ */
        .coracao {
            position: fixed;
            pointer-events: none;
            animation: cair linear forwards;
            z-index: 5;
        }

        @keyframes cair {
            0%   { transform: translateY(-30px) rotate(0deg) scale(1); opacity: 1; }
            50%  { transform: translateX(calc(var(--tx) * 30px)) translateY(50vh) rotate(15deg) scale(0.95); }
            100% { transform: translateX(calc(var(--tx) * 50px)) translateY(110vh) rotate(35deg) scale(0.7); opacity: 0; }
        }

        /* ══════════════════════════════════════════════════════════ */
        /* PERSONAGENS PIXEL ART                                      */
        /* ✅ FIX: position:fixed para não scrollar com a página      */
        /* ✅ FIX: sempre visível (nunca display:none após iniciar)   */
        /* ══════════════════════════════════════════════════════════ */
        #personagens {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            /* ✅ FIX: z-index alto para ficar sempre na frente */
            z-index: 50;
            display: none;
            /* fundo gradiente suave para os personagens não ficarem soltos */
            background: linear-gradient(to top, rgba(250,248,246,0.95) 60%, transparent 100%);
            padding-bottom: 10px;
            padding-top: 6px;
        }

        #textoPersonagens {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            /* ✅ FIX: menor no mobile */
            font-size: clamp(0.75rem, 2.8vw, 1rem);
            color: var(--rosa-primary);
            margin-bottom: 6px;
            min-height: 1.4em;
            padding: 0 20px;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
            font-weight: 400;
        }

        #textoPersonagens.visivel { opacity: 1; }

        .casal-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
        }

        .pixel-char {
            image-rendering: pixelated;
            /* ✅ FIX: menor no mobile */
            width: clamp(28px, 7vw, 40px);
            height: clamp(40px, 10vw, 56px);
            animation: bounce-char 0.6s steps(2) infinite alternate;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .pixel-char.char-b { animation-delay: 0.15s; }

        @keyframes bounce-char {
            from { transform: translateY(0px); }
            to   { transform: translateY(-6px); }
        }

        .coracao-casal {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            animation: subirCoracao 1.4s ease-in-out infinite;
        }

        @keyframes subirCoracao {
            0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
            30%  { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-28px); }
        }

        /* ══════════════════════════════════════════════════════════ */
        /* BARRA LEGENDA                                              */
        /* ══════════════════════════════════════════════════════════ */
        #legenda {
            position: fixed;
            /* ✅ FIX: fica acima dos personagens */
            bottom: 90px;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(212, 81, 111, 0.08), transparent);
            padding: 12px 0 14px;
            pointer-events: none;
            display: none;
            /* ✅ FIX: z-index abaixo dos personagens mas acima do conteúdo */
            z-index: 45;
        }

        #rolando {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: var(--rosa-primary);
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 20px;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        #rolando.visivel { opacity: 1; }

        /* ══════════════════════════════════════════════════════════ */
        /* PLAYER DE MÚSICA                                           */
        /* ✅ FIX: fixo no canto inferior esquerdo, bem compacto      */
        /* ✅ FIX: não cobre mais o nome/título nem os corações       */
        /* ══════════════════════════════════════════════════════════ */
        #player {
            position: fixed;
            /* ✅ FIX: canto inferior esquerdo, discreto */
            bottom: 16px;
            left: 16px;
            /* ✅ FIX: z-index acima dos personagens */
            z-index: 60;
            display: none;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            /* ✅ FIX: padding menor e compacto */
            padding: 6px 12px;
            box-shadow: 0 4px 20px rgba(212, 81, 111, 0.2);
            border: 1px solid rgba(212, 81, 111, 0.15);
            align-items: center;
            gap: 6px;
            font-family: 'Lato', sans-serif;
            /* ✅ FIX: fonte menor */
            font-size: 0.68rem;
            color: var(--rosa-primary);
            font-weight: 600;
            letter-spacing: 0.04em;
            /* ✅ FIX: largura máxima para não esticar no mobile */
            max-width: 160px;
        }

        #player .icone-musica {
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        #nomeMusica {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70px;
        }

        #btnMute {
            background: none;
            border: none;
            cursor: pointer;
            /* ✅ FIX: botão mudo menor */
            font-size: 0.9rem;
            padding: 2px;
            line-height: 1;
            flex-shrink: 0;
            pointer-events: all;
        }

        /* ══════════════════════════════════════════════════════════ */
        /* RESPONSIVIDADE MOBILE                                      */
        /* ══════════════════════════════════════════════════════════ */
        @media (max-width: 640px) {
            #app {
                padding: 36px 14px 220px;
            }

            .card-frases {
                padding: 30px 22px;
                border-radius: 20px;
            }

            #surpresa img {
                max-width: 240px;
            }

            .casal-wrapper {
                gap: 4px;
            }

            /* legenda sobe um pouco mais em mobile */
            #legenda {
                bottom: 80px;
            }
        }

        @media (max-width: 360px) {
            .titulo-inicio {
                font-size: 1.75rem;
            }

            .btn-iniciar {
                font-size: 0.75rem;
                padding: 12px 22px;
            }
        }
    </style>
</head>

<body>

    <!-- TELA INICIAL -->
    <div id="tela-inicio">
        <span class="inicio-coracao">❤️</span>
        <!-- ✅ FIX: "Feliz Aniversário" correto e romântico -->
        <p class="titulo-inicio">Feliz Aniversário</p>
        <p class="subtitulo-inicio">Para a pessoa mais especial da minha vida</p>
        <p class="data-inicio">16 de Maio · Com todo o meu amor</p>
        <br>
        <button class="btn-iniciar" onclick="iniciar()">Começar Nossa História ❤️</button>
    </div>

    <!-- ✅ FIX: PLAYER fixo, compacto, canto inferior esquerdo -->
    <div id="player">
        <span class="icone-musica">🎵</span>
        <span id="nomeMusica">All of Me</span>
        <button id="btnMute" onclick="toggleMute()" title="Mudo/Som">🔊</button>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app">
        <div class="header">
            <!-- ✅ FIX: texto menor e centralizado, não descentraliza no mobile -->
            <h1>💖 Nossa História 💖</h1>
            <span class="data-tag">Feliz Aniversário · 16 de Maio</span>
            <div class="contador-wrapper" id="contador"></div>
        </div>

        <div class="card-frases">
            <div id="texto"><span style="color:#c0859d;font-style:italic;font-size:0.95rem;font-weight:300;">Clique em
                    Próximo para começar nossa jornada ❤️</span></div>
            <div id="progresso"></div>
        </div>

        <button class="btn-proximo" id="btnProximo" onclick="proximaFrase()">Próximo ❤️</button>

        <!-- SURPRESA + MÚSICA 2 -->
        <div id="surpresa">
            <h2>Eu te Amo 💕</h2>
            <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Você é meu amor">
            <div id="textoMusica2"></div>
        </div>
    </div>

    <!-- ✅ FIX: PERSONAGENS sempre fixos, z-index alto, nunca somem -->
    <div id="personagens">
        <div id="textoPersonagens"></div>
        <div class="casal-wrapper" style="position:relative;">
            <!-- Personagem A (ela) -->
            <svg class="pixel-char" viewBox="0 0 8 12" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="0" width="4" height="4" fill="#f9c0c8"/>
                <rect x="1" y="0" width="6" height="1" fill="#c15a80"/>
                <rect x="1" y="1" width="1" height="2" fill="#c15a80"/>
                <rect x="6" y="1" width="1" height="2" fill="#c15a80"/>
                <rect x="2" y="2" width="1" height="1" fill="#2a1420"/>
                <rect x="5" y="2" width="1" height="1" fill="#2a1420"/>
                <rect x="3" y="3" width="2" height="1" fill="#d4516f"/>
                <rect x="2" y="4" width="4" height="4" fill="#ff9bb4"/>
                <rect x="1" y="4" width="1" height="3" fill="#f9c0c8"/>
                <rect x="2" y="8" width="2" height="4" fill="#c15a80"/>
                <rect x="4" y="8" width="2" height="4" fill="#c15a80"/>
            </svg>
            <!-- Coração entre os dois -->
            <div style="position:relative;width:20px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:28px;">
                <span class="coracao-casal">❤️</span>
            </div>
            <!-- Personagem B (ele) -->
            <svg class="pixel-char char-b" viewBox="0 0 8 12" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="0" width="4" height="4" fill="#f9c0c8"/>
                <rect x="1" y="0" width="6" height="2" fill="#5a3a2a"/>
                <rect x="2" y="2" width="1" height="1" fill="#2a1420"/>
                <rect x="5" y="2" width="1" height="1" fill="#2a1420"/>
                <rect x="3" y="3" width="2" height="1" fill="#d4516f"/>
                <rect x="2" y="4" width="4" height="4" fill="#7eb8f7"/>
                <rect x="6" y="4" width="1" height="3" fill="#f9c0c8"/>
                <rect x="2" y="8" width="2" height="4" fill="#4a6a9a"/>
                <rect x="4" y="8" width="2" height="4" fill="#4a6a9a"/>
            </svg>
        </div>
    </div>

    <!-- BARRA LEGENDA -->
    <div id="legenda"><span id="rolando"></span></div>

    <!-- ÁUDIOS -->
    <audio id="audio1" preload="auto"
        src="musica1.mp3/John Legend - All of Me (Official Video) - johnlegendVEVO (youtube).mp3"></audio>
    <audio id="audio2" preload="auto"
        src="musica2.mp3/Ed Sheeran - Photograph ( Tradução Legendado ) Filme Como Eu Era Antes De Você - Têvalldo Lyrics (128k).mp3"></audio>

    <script>
        // ══════════════════════════════════════════════════════════════
        // FRASES PRINCIPAIS
        // ══════════════════════════════════════════════════════════════
        const frases = [
            "Eu ainda lembro do dia que te conheci...",
            "No meio da rotina do trabalho...",
            "Você apareceu de forma inesperada...",
            "No começo, eu era só aquele cara meio chato 😅",
            "Mas você foi se acostumando comigo...",
            "E eu fui me apaixonando por você...",
            "Até que chegou aquele dia no carro...",
            "Aquele momento que mudaria tudo...",
            "Eu tinha medo de não ser o suficiente...",
            "Mas você me olhou com aquele sorriso...",
            "E eu tive coragem de falar a verdade...",
            "Eu te pedi em namoro...",
            "Mesmo inseguro, eu perguntei...",
            "E você... disse sim ❤️",
            "Aquele 'sim' mudou tudo na minha vida.",
            "Hoje eu sei que nada foi coincidência...",
            "Foi você. Sempre foi você."
        ];

        let fraseIndex = 0;
        let digitando = false;
        let timeoutDigitar = null;

        // ══════════════════════════════════════════════════════════════
        // EFEITO TYPEWRITER
        // ══════════════════════════════════════════════════════════════
        function digitar(texto, elId, cursorId, cb) {
            const el = document.getElementById(elId);
            const cur = cursorId ? document.getElementById(cursorId) : null;
            el.textContent = "";
            if (cur) el.appendChild(cur);

            let i = 0;
            function passo() {
                if (i <= texto.length) {
                    el.textContent = texto.slice(0, i);
                    if (cur) el.appendChild(cur);
                    i++;
                    timeoutDigitar = setTimeout(passo, 35);
                } else {
                    digitando = false;
                    if (cb) cb();
                }
            }
            digitando = true;
            passo();
        }

        // ══════════════════════════════════════════════════════════════
        // PRÓXIMA FRASE
        // ══════════════════════════════════════════════════════════════
        function proximaFrase() {
            if (digitando) return;
            const btn = document.getElementById("btnProximo");

            if (fraseIndex < frases.length) {
                btn.disabled = true;
                digitar(frases[fraseIndex], "texto", "cursor", () => {
                    fraseIndex++;
                    if (fraseIndex < frases.length) {
                        btn.disabled = false;
                    } else {
                        btn.textContent = "Ver a Surpresa 💌";
                        btn.disabled = false;
                        btn.onclick = mostrarSurpresa;
                    }
                });
            }
        }

        // Inicializar cursor
        document.getElementById("texto").insertAdjacentHTML("afterbegin", '<span id="cursor"></span>');

        // ══════════════════════════════════════════════════════════════
        // CONTADOR DE TEMPO JUNTOS
        // ══════════════════════════════════════════════════════════════
        const dataInicio = new Date("2024-01-01T00:00:00");

        function textoTempo(dias) {
            const anos = Math.floor(dias / 365);
            const meses = Math.floor((dias % 365) / 30.44);
            const semanas = Math.floor((dias % 30.44) / 7);

            if (anos >= 2) return `Estamos juntos há ${anos} anos e ${meses} meses ❤️`;
            if (anos === 1 && meses >= 6) return `Estamos juntos há mais de um ano e meio ❤️`;
            if (anos === 1) return `Estamos juntos há mais de um ano ❤️`;
            if (meses >= 11) return `Estamos juntos há quase um ano ❤️`;
            if (meses >= 1) return `Estamos juntos há ${meses} ${meses === 1 ? "mês" : "meses"} ❤️`;
            if (semanas >= 1) return `Estamos juntos há ${semanas} ${semanas === 1 ? "semana" : "semanas"} ❤️`;
            return `Estamos juntos há ${dias} dias ❤️`;
        }

        function atualizarContador() {
            const diff = new Date() - dataInicio;
            const dias = Math.floor(diff / 86400000);
            document.getElementById("contador").textContent = textoTempo(dias);
        }

        atualizarContador();
        setInterval(atualizarContador, 60000);

        // ══════════════════════════════════════════════════════════════
        // CORAÇÕES FLUTUANTES
        // ══════════════════════════════════════════════════════════════
        function criarCoracao() {
            const c = document.createElement("div");
            const emojis = ["❤️", "🌸", "💕", "✨", "🌷"];
            c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            c.classList.add("coracao");

            const left = Math.random() * 100;
            const tx = Math.random() > 0.5 ? 0.5 : -0.5;
            c.style.left = left + "vw";
            c.style.top = "-40px";
            c.style.fontSize = (14 + Math.random() * 18) + "px";
            c.style.setProperty("--tx", tx);

            const dur = 5 + Math.random() * 4;
            c.style.animationDuration = dur + "s";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), dur * 1000 + 500);
        }

        setInterval(criarCoracao, 400);

        // ══════════════════════════════════════════════════════════════
        // CONTROLE DE ÁUDIO
        // ══════════════════════════════════════════════════════════════
        const audio1 = document.getElementById("audio1");
        const audio2 = document.getElementById("audio2");

        let musica2Iniciada = false;
        let mutado = false;

        audio1.addEventListener("ended", () => {
            iniciarSegundaMusica();
        });

        // ══════════════════════════════════════════════════════════════
        // BOTÃO MUDO/SOM
        // ══════════════════════════════════════════════════════════════
        function toggleMute() {
            mutado = !mutado;
            audio1.muted = mutado;
            audio2.muted = mutado;
            document.getElementById("btnMute").textContent = mutado ? "🔇" : "🔊";
        }

        // ══════════════════════════════════════════════════════════════
        // BOTÃO INICIAR
        // ══════════════════════════════════════════════════════════════
        function iniciar() {
            document.getElementById("tela-inicio").classList.add("oculta");
            document.getElementById("personagens").style.display = "block";
            document.getElementById("player").style.display = "flex";
            iniciarTextoPersonagens();

            audio1.volume = 0.75;
            audio1.play().catch(err => {
                console.warn("Erro ao reproduzir música 1:", err);
            });
        }

        // ══════════════════════════════════════════════════════════════
        // TEXTO DOS PERSONAGENS
        // ══════════════════════════════════════════════════════════════
        const frasesPersonagens = [
            "Juntos em cada momento... ❤️",
            "Você é minha pessoa favorita 🌸",
            "Todo dia com você é especial 💕",
            "Meu coração é sempre seu ❤️",
            "Você me faz sorrir sempre ✨",
            "Nossa história é a mais bonita 💕"
        ];

        let fpIdx = 0;

        function iniciarTextoPersonagens() {
            mostrarFrasePersonagem();
            setInterval(mostrarFrasePersonagem, 6000);
        }

        function mostrarFrasePersonagem() {
            const el = document.getElementById("textoPersonagens");
            el.classList.remove("visivel");
            setTimeout(() => {
                el.textContent = frasesPersonagens[fpIdx % frasesPersonagens.length];
                fpIdx++;
                el.classList.add("visivel");
            }, 400);
        }

        // ══════════════════════════════════════════════════════════════
        // MOSTRAR SURPRESA
        // ✅ FIX: personagens NÃO somem mais — removido o display:none
        // ══════════════════════════════════════════════════════════════
        function mostrarSurpresa() {
            document.getElementById("surpresa").style.display = "flex";
            document.getElementById("btnProximo").style.display = "none";
            // ✅ FIX CRÍTICO: personagens continuam visíveis!
            // document.getElementById("personagens").style.display = "none"; ← REMOVIDO

            if (audio1.ended && !musica2Iniciada) {
                iniciarSegundaMusica();
            }
        }

        // ══════════════════════════════════════════════════════════════
        // SEGUNDA MÚSICA + FRASES SINCRONIZADAS
        // ✅ FIX: personagens NÃO somem aqui também
        // ══════════════════════════════════════════════════════════════
        const textoMusica2 = [
            "Você sabe que essa música é especial para mim...",
            "Ela vem do filme que mais me marcou...",
            "'How I Met You Before You Were You'...",
            "Uma história de amor tão bonita quanto a nossa...",
            "",
            "Mas hoje, quando ouço essa música...",
            "Eu não penso em quem era antes.",
            "",
            "Eu penso em você.",
            "Em cada momento ao seu lado.",
            "Em cada sorriso, cada abraço...",
            "Em cada 'te amo' que saiu do meu coração.",
            "",
            "Eu sei que não estou sempre perto...",
            "Que às vezes a distância nos separa...",
            "Mas meu coração, meu pensamento, meu amor...",
            "Sempre estão com você.",
            "",
            "Mesmo longe, você é meu lar.",
            "Você é meu tudo.",
            "Feliz aniversário, meu amor ❤️"
        ];

        const DURACAO_MUSICA2 = 257;
        const INTERVALO_LINHA = Math.floor((DURACAO_MUSICA2 * 1000) / textoMusica2.length);

        let textoM2Timer = null;

        function iniciarSegundaMusica() {
            if (musica2Iniciada) return;
            musica2Iniciada = true;

            document.getElementById("surpresa").style.display = "flex";
            document.getElementById("btnProximo").style.display = "none";
            // ✅ FIX CRÍTICO: personagens continuam visíveis!
            // document.getElementById("personagens").style.display = "none"; ← REMOVIDO

            document.getElementById("nomeMusica").textContent = "Photograph";

            audio2.volume = 0.75;
            audio2.play().catch(err => {
                console.warn("Erro ao reproduzir música 2:", err);
            });

            document.getElementById("legenda").style.display = "block";

            const campo = document.getElementById("textoMusica2");
            if (!document.getElementById("cursor2")) {
                campo.insertAdjacentHTML("afterbegin", '<span id="cursor2"></span>');
            }

            let i = 0;

            function mostrarLinha() {
                if (i >= textoMusica2.length) return;

                const linha = textoMusica2[i];
                i++;

                if (linha === "") {
                    campo.textContent = "";
                    const cur2 = document.getElementById("cursor2");
                    if (cur2) campo.appendChild(cur2);
                } else {
                    digitar(linha, "textoMusica2", "cursor2", null);
                }

                atualizarLegenda();
                textoM2Timer = setTimeout(mostrarLinha, INTERVALO_LINHA);
            }

            audio2.addEventListener("ended", () => {
                clearTimeout(textoM2Timer);
                campo.textContent = "❤️ Eu te amo ❤️";
                document.getElementById("legenda").style.display = "none";
                document.getElementById("player").style.display = "none";
            }, { once: true });

            mostrarLinha();
        }

        // ══════════════════════════════════════════════════════════════
        // LEGENDAS
        // ══════════════════════════════════════════════════════════════
        const frasesLegenda = [
            "Você é meu pensamento constante...",
            "Seu sorriso ilumina meus dias...",
            "Estar com você é leve e seguro...",
            "Você é meu refúgio...",
            "Cada passo é com você em meu coração...",
            "Mesmo distante, você é meu tudo ❤️"
        ];

        let legendaIdx = 0;
        let legendaTimer = null;

        function atualizarLegenda() {
            const el = document.getElementById("rolando");
            el.classList.remove("visivel");
            setTimeout(() => {
                el.textContent = frasesLegenda[legendaIdx % frasesLegenda.length];
                legendaIdx++;
                el.classList.add("visivel");
            }, 400);
        }

        audio2.addEventListener("play", () => {
            atualizarLegenda();
            legendaTimer = setInterval(atualizarLegenda, 7000);
        });

        audio2.addEventListener("ended", () => {
            clearInterval(legendaTimer);
        });
    </script>

</body>
</html>
